name: flutter_multiselect_plus
description: "A highly customizable multiselect dropdown for Flutter with search, select all, and custom styling."
version: 1.1.0

homepage: "https://github.com/mrityudata/flutter_multiselect_plus"
repository: "https://github.com/mrityudata/flutter_multiselect_plus"

environment:
  sdk: ^3.11.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # To add assets to your package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package

screenshots:
  - description: 'Main view showing selected items as chips.'
    path: screenshots/selected_items.png
  - description: 'Dropdown dialog with select all functionality.'
    path: screenshots/dropdown.png
  - description: 'Dropdown dialog selecting items.'
    path: screenshots/select_tech_task.png
  - description: 'Dropdown dialog with single select.'
    path: screenshots/selecting_priority.png
  - description: 'Dropdown dialog with searching.'
    path: screenshots/searching_item.png
